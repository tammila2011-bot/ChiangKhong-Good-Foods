<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChiangKhong Good Foods</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
    body { margin: 0; padding: 15px; background-color: #f8f9fa; color: #333; }
    
    .cover-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin-bottom: 15px;
    }

    .filter-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    select {
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background-color: white;
      width: 100%;
    }

    .btn-location {
      width: 100%;
      padding: 12px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: background-color 0.2s ease;
    }
    .btn-location:active { background-color: #218838; }

    .geo-status {
      text-align: center;
      font-size: 13px;
      color: #0056b3;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #map {
      height: 320px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .shop-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    .shop-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      border-top: 4px solid #1e3d59;
    }
    .shop-card h3 { margin: 0 0 8px 0; font-size: 18px; color: #1e3d59; }
    .shop-card p { margin: 4px 0; color: #555; font-size: 14px; }
    
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      flex: 1;
      min-width: 80px;
      text-align: center;
      padding: 8px 0;
      background: #17a2b8;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      border: none;
      cursor: pointer;
    }
    .btn-call { background: #28a745; }
    .btn-review { background: #ffc107; color: #333; font-weight: bold; }

    .loading {
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: #666;
    }

    /* Modal ป๊อบอัพให้คะแนน */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .star-rating {
      font-size: 30px;
      color: #ddd;
      cursor: pointer;
      margin: 10px 0;
    }
    .star-rating span.active { color: #ffc107; }
    .modal-content textarea {
      width: 100%;
      height: 80px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
      font-family: inherit;
    }
    .modal-btn-group {
      display: flex;
      gap: 10px;
    }
    .btn-submit { background: #28a745; color: white; flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-close { background: #dc3545; color: white; flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

  <!-- รูปภาพหน้าปก -->
  <img src="food1.png" alt="ChiangKhong Good Foods" class="cover-image" onerror="this.style.display='none'">

  <!-- Filter Section -->
  <div class="filter-box">
    <select id="typeSelect" onchange="onTypeChange()">
      <option value="">-- เลือกประเภทอาหาร --</option>
    </select>

    <select id="groupSelect" onchange="onGroupChange()" disabled>
      <option value="">-- เลือกกลุ่มร้านอาหาร --</option>
    </select>
  </div>

  <!-- ปุ่ม GPS -->
  <button type="button" class="btn-location" onclick="getUserLocation()">
    📍 แสดงตำแหน่งของฉัน (GPS)
  </button>
  <div id="geoStatus" class="geo-status"></div>

  <!-- Map Display -->
  <div id="map"></div>

  <!-- Shop List -->
  <div id="loading" class="loading">กำลังโหลดข้อมูลร้านอาหาร...</div>
  <div id="shopList" class="shop-list"></div>

  <!-- Modal สำหรับให้คะแนนร้าน -->
  <div id="reviewModal" class="modal">
    <div class="modal-content">
      <h3 id="modalShopName" style="margin-top:0; color:#1e3d59;">ให้คะแนนร้านอาหาร</h3>
      <div class="star-rating" id="starContainer">
        <span onclick="setRating(1)">★</span>
        <span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span>
        <span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
      </div>
      <textarea id="reviewComment" placeholder="เขียนรีวิว หรือเมนูแนะนำ (ถ้ามี)..."></textarea>
      <div class="modal-btn-group">
        <button class="btn-submit" onclick="submitReview()">ส่งรีวิว</button>
        <button class="btn-close" onclick="closeReviewModal()">ยกเลิก</button>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZsib5oN-RADz2qmMEkBzQpXnHkx9uEcNsmsGspaR7RLtIigIlBTTeWtdUln9T8NRd/exec";

    let rawData = [];
    let map;
    let markers = [];
    let userMarker = null;
    
    // ตัวแปรสำหรับระบบรีวิว
    let currentShopForReview = "";
    let selectedRating = 5;

    function initMap() {
      map = L.map('map').setView([20.2612, 100.4045], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
    }

    async function fetchData() {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL);
        rawData = await response.json();
        document.getElementById("loading").style.display = "none";
        populateTypes();
      } catch (error) {
        document.getElementById("loading").innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
        console.error("Error fetching data:", error);
      }
    }

    function populateTypes() {
      const typeSelect = document.getElementById("typeSelect");
      const types = [...new Set(rawData.map(item => item.type_name))];

      types.forEach(typeName => {
        if (typeName) {
          let opt = document.createElement("option");
          opt.value = typeName;
          opt.innerText = typeName;
          typeSelect.appendChild(opt);
        }
      });
    }

    function onTypeChange() {
      const selectedType = document.getElementById("typeSelect").value;
      const groupSelect = document.getElementById("groupSelect");

      groupSelect.innerHTML = '<option value="">-- เลือกกลุ่มร้านอาหาร --</option>';
      groupSelect.disabled = true;

      if (!selectedType) return;

      const filteredGroups = [...new Set(
        rawData
          .filter(item => item.type_name === selectedType)
          .map(item => item.group_name)
      )];

      filteredGroups.forEach(groupName => {
        if (groupName) {
          let opt = document.createElement("option");
          opt.value = groupName;
          opt.innerText = groupName;
          groupSelect.appendChild(opt);
        }
      });

      groupSelect.disabled = false;
    }

    function onGroupChange() {
      const selectedType = document.getElementById("typeSelect").value;
      const selectedGroup = document.getElementById("groupSelect").value;

      const shops = rawData.filter(item => 
        item.type_name === selectedType && item.group_name === selectedGroup
      );

      displayShops(shops);
    }

    function displayShops(shops) {
      const listContainer = document.getElementById("shopList");
      listContainer.innerHTML = "";

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      if (shops.length === 0) {
        listContainer.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>ไม่พบร้านอาหารในหมวดหมู่นี้</p>";
        return;
      }

      shops.forEach(shop => {
        const card = document.createElement("div");
        card.className = "shop-card";
        card.innerHTML = `
          <h3>${shop.shop_name}</h3>
          <p>${shop.detail || 'ไม่มีข้อมูลรายละเอียด'}</p>
          <div class="btn-group">
            ${shop.lat && shop.lng ? `<a class="btn" href="https://www.google.com/maps/search/?api=1&query=${shop.lat},${shop.lng}" target="_blank">🗺️ นำทาง</a>` : ''}
            ${shop.phone ? `<a class="btn btn-call" href="tel:${shop.phone}">📞 โทร</a>` : ''}
            <button class="btn btn-review" onclick="openReviewModal('${shop.shop_name}')">⭐ รีวิว</button>
          </div>
        `;
        listContainer.appendChild(card);

        if (shop.lat && shop.lng) {
          const marker = L.marker([parseFloat(shop.lat), parseFloat(shop.lng)])
            .addTo(map)
            .bindPopup(`<b>${shop.shop_name}</b><br>${shop.detail || ''}`);
          markers.push(marker);
        }
      });

      if (shops.length > 0 && shops[0].lat && shops[0].lng) {
        map.setView([parseFloat(shops[0].lat), parseFloat(shops[0].lng)], 14);
      }
    }

    function getUserLocation() {
      const statusEl = document.getElementById("geoStatus");

      if (!navigator.geolocation) {
        alert("อุปกรณ์หรือเบราว์เซอร์ของคุณไม่รองรับ GPS");
        return;
      }

      statusEl.innerText = "⏳ กำลังค้นหาพิกัด GPS ของคุณ...";

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;

          if (userMarker) {
            map.removeLayer(userMarker);
          }

          userMarker = L.marker([userLat, userLng])
            .addTo(map)
            .bindPopup("<b>📍 คุณอยู่ที่นี่</b>")
            .openPopup();

          map.setView([userLat, userLng], 15);
          statusEl.innerText = "✅ พบตำแหน่งของคุณแล้ว";
        },
        (error) => {
          statusEl.innerText = "❌ ไม่สามารถระบุตำแหน่ง GPS ได้";
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // --- ฟังก์ชันสำหรับระบบรีวิว ⭐ ---
    function openReviewModal(shopName) {
      currentShopForReview = shopName;
      document.getElementById("modalShopName").innerText = "⭐ ให้คะแนน: " + shopName;
      document.getElementById("reviewComment").value = "";
      setRating(5); // ค่าเริ่มต้น 5 ดาว
      document.getElementById("reviewModal").style.display = "flex";
    }

    function closeReviewModal() {
      document.getElementById("reviewModal").style.display = "none";
    }

    function setRating(stars) {
      selectedRating = stars;
      const starSpans = document.querySelectorAll("#starContainer span");
      starSpans.forEach((span, idx) => {
        if (idx < stars) {
          span.classList.add("active");
        } else {
          span.classList.remove("active");
        }
      });
    }

    async function submitReview() {
      const comment = document.getElementById("reviewComment").value;
      const submitBtn = document.querySelector(".btn-submit");
      
      submitBtn.innerText = "กำลังบันทึก...";
      submitBtn.disabled = true;

      const payload = {
        shop_name: currentShopForReview,
        rating: selectedRating,
        comment: comment
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        alert("ขอบคุณสำหรับคะแนนรีวิวครับ!");
        closeReviewModal();
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการส่งข้อมูล โปรดลองอีกครั้ง");
        console.error("Error submitting review:", error);
      } finally {
        submitBtn.innerText = "ส่งรีวิว";
        submitBtn.disabled = false;
      }
    }

    window.onload = () => {
      initMap();
      fetchData();
    };
  </script>
</body>
</html>
